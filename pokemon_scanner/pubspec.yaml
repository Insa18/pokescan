name: pokemon_scanner
description: "Application Flutter de scan de cartes Pokémon (caméra → OCR → prix)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Caméra (aperçu live + capture photo) — mobile
  camera: ^0.11.0

  # Sélection / capture photo — utilisé pour la version web (iOS Safari)
  image_picker: ^1.1.2

  # Type XFile commun (capture mobile + web)
  cross_file: ^0.3.4

  # OCR — Google ML Kit, gratuit et local sur le téléphone
  google_mlkit_text_recognition: ^0.13.0

  # Appels réseau vers l'API Pokémon TCG
  http: ^1.2.0

  # Ouverture de liens externes (Cardmarket)
  url_launcher: ^6.3.0

  # Stockage local (historique + cache hors-ligne)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Génération des icônes de lancement (Pokéball) Android
  flutter_launcher_icons: ^0.14.1

# Configuration de l'icône de l'application (Pokéball rouge/blanc sur jaune).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFCB05"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true

  # Dictionnaire français → anglais des noms de Pokémon (l'API n'utilise que
  # les noms anglais ; les cartes FR sont donc traduites avant la recherche).
  assets:
    - assets/fr_en_pokemon.json
